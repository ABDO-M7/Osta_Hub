
<style>
  .panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
  .label { font-size: 13px; color: var(--color-text-secondary); }
  .val { font-size: 14px; font-weight: 500; min-width: 50px; text-align: right; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; flex: 1; }
  .eq { font-family: var(--font-mono); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 14px; margin-bottom: 1rem; }
</style>

<div style="padding: 1rem 0;">
  <div style="display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;">
    <div class="metric-card">
      <div class="metric-label">θ₀ — bias (intercept)</div>
      <div class="metric-val" id="disp-t0">0.00</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">θ₁ — slope</div>
      <div class="metric-val" id="disp-t1">1.00</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">MSE</div>
      <div class="metric-val" id="disp-mse">—</div>
    </div>
  </div>

  <div class="eq" id="equation">ŷ = 0.00 + 1.00 · x</div>

  <div style="position: relative; width: 100%; height: 320px; margin-bottom: 1rem;">
    <canvas id="chart"></canvas>
  </div>

  <div class="panel">
    <div class="row">
      <span class="label" style="width: 120px;">θ₀ bias</span>
      <input type="range" id="t0" min="-5" max="5" step="0.1" value="0" style="flex:1;">
      <span class="val" id="t0-out">0.0</span>
    </div>
    <div class="row" style="margin-bottom: 0;">
      <span class="label" style="width: 120px;">θ₁ slope</span>
      <input type="range" id="t1" min="-3" max="3" step="0.05" value="1" style="flex:1;">
      <span class="val" id="t1-out">1.00</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const rawX = [0.5,1.0,1.5,2.0,2.5,3.0,3.5,4.0,4.5,5.0,5.5,6.0,6.5,7.0,7.5,8.0,8.5,9.0,9.5,10.0];
const noise = [0.3,-0.5,0.8,-0.2,1.1,-0.7,0.4,1.2,-0.3,0.6,-0.9,0.5,-0.4,1.0,-0.6,0.3,0.9,-0.5,0.7,-0.2];
const trueSlope = 0.7, trueBias = 1.5;
const dataPoints = rawX.map((x, i) => ({ x, y: parseFloat((trueBias + trueSlope * x + noise[i]).toFixed(2)) }));

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const ptColor = isDark ? '#7F77DD' : '#534AB7';
const lineColor = isDark ? '#1D9E75' : '#0F6E56';
const errColor = isDark ? 'rgba(216,90,48,0.35)' : 'rgba(153,60,29,0.25)';
const errStroke = isDark ? 'rgba(216,90,48,0.7)' : 'rgba(153,60,29,0.6)';
const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
const tickColor = isDark ? '#888780' : '#5F5E5A';

function getLine(t0, t1) {
  return [{ x: 0, y: t0 }, { x: 10.5, y: t0 + t1 * 10.5 }];
}

function calcMSE(t0, t1) {
  const n = dataPoints.length;
  const sum = dataPoints.reduce((acc, p) => acc + Math.pow(p.y - (t0 + t1 * p.x), 2), 0);
  return sum / n;
}

function buildErrorBars(t0, t1) {
  return dataPoints.map(p => {
    const pred = t0 + t1 * p.x;
    return { x: p.x, yActual: p.y, yPred: pred };
  });
}

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'Data points',
        data: dataPoints,
        backgroundColor: ptColor,
        pointRadius: 5,
        pointHoverRadius: 7,
        order: 2
      },
      {
        label: 'Regression line',
        data: getLine(0, 1),
        type: 'line',
        borderColor: lineColor,
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0,
        fill: false,
        order: 1
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 80 },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => `(${ctx.parsed.x.toFixed(1)}, ${ctx.parsed.y.toFixed(2)})`
        }
      }
    },
    scales: {
      x: { min: 0, max: 10.5, grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 12 } }, title: { display: true, text: 'x', color: tickColor } },
      y: { min: -3, max: 12, grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 12 } }, title: { display: true, text: 'y', color: tickColor } }
    }
  },
  plugins: [{
    id: 'errorLines',
    afterDatasetsDraw(chart) {
      const t0 = parseFloat(document.getElementById('t0').value);
      const t1 = parseFloat(document.getElementById('t1').value);
      const errors = buildErrorBars(t0, t1);
      const cx = chart.ctx;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;

      cx.save();
      errors.forEach(e => {
        const px = xScale.getPixelForValue(e.x);
        const pyA = yScale.getPixelForValue(e.yActual);
        const pyP = yScale.getPixelForValue(e.yPred);
        const top = Math.min(pyA, pyP);
        const h = Math.abs(pyA - pyP);
        if (h < 1) return;
        cx.fillStyle = errColor;
        cx.strokeStyle = errStroke;
        cx.lineWidth = 0.8;
        cx.fillRect(px - 5, top, 10, h);
        cx.strokeRect(px - 5, top, 10, h);
      });
      cx.restore();
    }
  }]
});

function update() {
  const t0 = parseFloat(document.getElementById('t0').value);
  const t1 = parseFloat(document.getElementById('t1').value);

  document.getElementById('t0-out').textContent = t0.toFixed(1);
  document.getElementById('t1-out').textContent = t1.toFixed(2);
  document.getElementById('disp-t0').textContent = t0.toFixed(2);
  document.getElementById('disp-t1').textContent = t1.toFixed(2);

  const mse = calcMSE(t0, t1);
  document.getElementById('disp-mse').textContent = mse.toFixed(3);

  const sign = t1 >= 0 ? '+' : '−';
  const absT1 = Math.abs(t1).toFixed(2);
  document.getElementById('equation').textContent = `ŷ = ${t0.toFixed(2)} ${sign} ${absT1} · x`;

  chart.data.datasets[1].data = getLine(t0, t1);
  chart.update('none');
}

document.getElementById('t0').addEventListener('input', update);
document.getElementById('t1').addEventListener('input', update);
update();
</script>
